name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: pnpm build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm test

      # Skip --with-deps: the ubuntu-latest image already has the
      # system libraries Playwright's bundled chromium needs, and
      # --with-deps pulls heavy font packages via apt-get that
      # routinely blow past the job's wall-clock budget in CI.
      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: e2e
        run: pnpm e2e
