name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: pnpm build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: e2e
        run: pnpm e2e
